<header class="header">
  <div class="top-bar">
    <div class="container top-bar-inner">
      <div class="contact-info">
        <span><i class="icon-phone"></i> +263 78 545 1677</span>
        <span><i class="icon-email"></i> info&#64;aeternusworks.co.zw</span>
        <span><i class="icon-location"></i> Harare, Zimbabwe</span>
      </div>
      <div class="social-icons">
        <a href="#"><i class="icon-facebook"></i></a>
        <a href="#"><i class="icon-twitter"></i></a>
        <a href="#"><i class="icon-linkedin"></i></a>
      </div>
    </div>
  </div>
  
  <div class="main-nav">
    <div class="container nav-inner">
      <a routerLink="/" class="logo">
        <img src="logo.png" alt="Aeternus Works Construction">
      </a>
      
      <button class="mobile-toggle" (click)="toggleMenu()" aria-label="Toggle navigation" [attr.aria-expanded]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="mobile-backdrop" [class.open]="isMenuOpen" (click)="closeMenu()"></div>

      <nav class="nav-links" [class.open]="isMenuOpen">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About Us</a>
        <a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a>
        <a routerLink="/renovations" routerLinkActive="active" (click)="closeMenu()">Renovation Ideas</a>
        <a routerLink="/company-structure" routerLinkActive="active" (click)="closeMenu()">Company Structure</a>
        <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact Us</a>
        <a routerLink="/contact" class="btn btn-primary ml-auto" (click)="closeMenu()">Request a Quote</a>
      </nav>
    </div>
  </div>
</header>
