<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <div class="sidebar-top-row">
        <img src="logo.png" alt="Aeternus Works" class="sidebar-logo">
        <button class="sidebar-close" type="button" (click)="closeSidebar()" aria-label="Close menu">×</button>
      </div>
      <h3>Admin Panel</h3>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/projects" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">🏗️</span> Projects
      </a>
      <a routerLink="/admin/renovations" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">🔨</span> Renovation Ideas
      </a>
      <a routerLink="/admin/services" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">📋</span> Services
      </a>
      <a routerLink="/admin/team" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">👥</span> Company Structure
      </a>
      <a routerLink="/admin/inquiries" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <span class="nav-icon">✉️</span> Inquiries
      </a>
    </nav>
    
    <!-- Sidebar Footer: User dropdown -->
    <div class="sidebar-footer">
      <div class="user-menu-wrapper">
        <button type="button" class="sidebar-user-btn" (click)="toggleUserMenu()" id="user-menu-trigger">
          <div class="sidebar-user-avatar">{{ username.charAt(0).toUpperCase() }}</div>
          <div class="sidebar-user-details">
            <span class="sidebar-user-name">{{ username }}</span>
            <span class="sidebar-user-role" [class.super-admin]="isSuperAdmin">{{ isSuperAdmin ? 'Super Admin' : 'Admin' }}</span>
          </div>
          <svg class="sidebar-chevron" [class.rotated]="isUserMenuOpen" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>

        <!-- Dropdown opens upward -->
        <div class="user-dropdown" [class.open]="isUserMenuOpen">
          <button class="user-dropdown-item" (click)="navigateSettings()" id="user-settings-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            Settings
          </button>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item danger" (click)="logout()" id="user-logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </aside>
  <div class="sidebar-backdrop" [class.open]="isSidebarOpen" (click)="closeSidebar()"></div>

  <!-- Main Content -->
  <div class="admin-main">
    <header class="admin-header">
      <button class="sidebar-toggle" type="button" (click)="toggleSidebar()" aria-label="Toggle menu">☰</button>
      <div class="header-left">
        <h2>Aeternus Works Management</h2>
      </div>
      <div class="header-right">
        <button type="button" class="btn btn-sm btn-secondary notification-btn" (click)="navigateNotifications()" title="View new inquiries">
          🔔
          <span *ngIf="pendingInquiryCount > 0" class="notification-badge">{{ pendingInquiryCount }}</span>
        </button>
        <a routerLink="/" class="btn btn-sm btn-secondary" target="_blank">View Live Site</a>
      </div>
    </header>
    
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>

    <footer class="admin-footer">
      <div class="footer-content">
        <p>&copy; 2026 Aeternus Works Admin Console. All rights reserved.</p>
        <p class="footer-version">Console v1.0.0</p>
      </div>
    </footer>
  </div>
</div>
