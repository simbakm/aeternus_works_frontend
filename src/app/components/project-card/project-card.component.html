<div class="project-card-link" role="link" tabindex="0" (click)="navigateToProject()" (keydown)="onCardKeydown($event)">
  <div class="project-card">
    <div class="card-img-wrapper">
      <img [src]="getImage(project)" [alt]="project.title" class="card-img">
      <div class="card-overlay">
        <span class="btn btn-primary btn-sm">View Details</span>
        <button type="button" class="btn btn-secondary btn-sm" [routerLink]="['/contact']" [queryParams]="{ project: project.title }" (click)="$event.stopPropagation()">Inquire Now</button>
      </div>
    </div>
    <div class="card-content">
      <h3 class="card-title">{{ project.title }}</h3>
      <div class="card-meta">
        <span class="category">{{ project.category }}</span>
        <span class="date">{{ project.date }}</span>
      </div>
      <div class="corner-triangle"></div>
    </div>
  </div>
</div>
