<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="logo.png" alt="Aeternus Works" class="login-logo">
      <h2>Admin Dashboard</h2>
      <p>Sign in to manage your website</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" required class="form-control" placeholder="Enter username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required class="form-control" placeholder="Enter password">
      </div>

      @if (error) {
        <div class="error-message">{{ error }}</div>
      }

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.form.valid">Login</button>
      
      <div class="text-center mt-2">
        <a href="javascript:void(0)" (click)="resetPassword()" class="reset-link">Forgot Password?</a>
      </div>
    </form>
  </div>
</div>
